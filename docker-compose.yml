version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: palmistry_user
      POSTGRES_PASSWORD: palmistry_password
      POSTGRES_DB: palmistry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palmistry_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://palmistry_user:palmistry_password@db:5432/palmistry
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main_enhanced:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Frontend
  # frontend:
  #   image: node:18-alpine
  #   working_dir: /app
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./palmistry:/app
  #   command: npm run dev

volumes:
  postgres_data:
  